<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Memo Update 1.1.2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

        :root {
            --primary-purple: #5A4CFF;
            --primary-blue: #3B45C4;
            --accent-yellow: #FFD700;
            --bg-color: #F7F9FC;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1A1A1A;
            --text-sub: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e5ec;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 画布容器：3:4 比例 */
        .poster-container {
            position: relative;
            width: 600px;
            height: 800px;
            background-color: #fff;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        /* 背景装饰 - 高斯模糊Logo背景 */
        .hero-bg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.15;
            z-index: 0;
        }
        .hero-bg img {
            width: 24rem;
            height: 24rem;
            object-fit: contain;
            filter: blur(48px);
            transform: scale(1.5);
        }

        /* 内容层级 */
        .content-layer {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 顶部 Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 您的Logo样式调整 */
        .logo-img {
            height: 48px; 
            /* 如果图片有白底，建议在PS里去底，或者使用混合模式。这里假设是透明PNG */
            object-fit: contain;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary-blue);
            letter-spacing: -0.5px;
        }

        .version-tag {
            background: rgba(59, 69, 196, 0.1);
            color: var(--primary-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(59, 69, 196, 0.2);
        }

        /* 主标题区 */
        .hero-section {
            margin-bottom: 30px;
        }

        .date {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 500;
        }

        h1 {
            font-size: 42px;
            line-height: 1.2;
            color: #111;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3B45C4 0%, #6B5BFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* 更新卡片列表 */
        .update-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px 24px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 32px rgba(59, 69, 196, 0.05);
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: transform 0.2s;
        }

        /* 重点卡片样式 */
        .card.highlight {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(107, 91, 255, 0.3);
            box-shadow: 0 12px 36px rgba(107, 91, 255, 0.15);
        }

        .icon-box {
            font-size: 28px;
            line-height: 1;
            padding-top: 4px; /* 视觉对齐 */
        }

        .card-content h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .card-content p {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.5;
        }

        /* 底部 Footer */
        footer {
            margin-top: auto;
            text-align: center;
            padding-top: 20px;
        }
        
        .cta-btn {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-purple));
            color: white;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(59, 69, 196, 0.3);
            margin-bottom: 12px;
        }

        .website {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 500;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <!-- 高斯模糊Logo背景 -->
        <div class="hero-bg">
            <img src="logo-single.png" alt="Chat Memo Logo" onerror="this.style.display='none'">
        </div>

        <div class="content-layer">
            <!-- 头部 -->
            <header>
                <div class="logo-area">
                    <!-- 请在此处替换您的 logo 图片路径 -->
                    <img src="logo.png" alt="Chat Memo Logo" class="logo-img" onerror="this.style.display='none'; document.querySelector('.brand-name').style.display='block'">
                    <!-- 如果图片加载失败，会显示下面的文字 -->
                    <span class="brand-name" style="display:none">Chat Memo</span> 
                </div>
                <div class="version-tag">Ver 1.1.2</div>
            </header>

            <!-- 标题区 -->
            <div class="hero-section">
                <p class="date">2025年12月3日 更新</p>
                <h1>浏览器兼容大优化，<br>支持 Kimi 记忆</h1>
            </div>

            <!-- 卡片列表 -->
            <div class="update-list">
                
                <!-- 卡片 1: 重点 Kimi -->
                <div class="card highlight">
                    <div class="icon-box">🚀</div>
                    <div class="card-content">
                        <h3>新增 Kimi 平台记录</h3>
                        <p>终于等到你！现在可以自动保存 Kimi 的对话记录了。现在已支持 GPT、Gemini、Claude、Deepseek、豆包、元宝、Kimi。</p>
                    </div>
                </div>

                <!-- 卡片 2: 兼容性 -->
                <div class="card">
                    <div class="icon-box">✨</div>
                    <div class="card-content">
                        <h3>浏览器兼容性大优化</h3>
                        <p>无论你是用 Dia 、Arc、Atlas，还是夸克，任何浏览器都能正常使用啦，丝滑无阻。</p>
                    </div>
                </div>

                <!-- 卡片 3: 修复 -->
                <div class="card">
                    <div class="icon-box">🔧</div>
                    <div class="card-content">
                        <h3>豆包平台修复</h3>
                        <p>修复了豆包平台消息保存失败的问题，确保所有对话都能可靠保存。</p>
                    </div>
                </div>

            </div>

            <!-- 底部 -->
            <footer>
                <div class="cta-btn">搜索 Chat Memo，立即保存 AI 记忆</div>
                <div class="website">chatmemo.ai</div>
            </footer>
        </div>
    </div>

</body>
</html>
